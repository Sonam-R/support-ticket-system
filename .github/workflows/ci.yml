name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: support_ticket_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d support_ticket_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/support_ticket_test
      JWT_SECRET: test-jwt-secret
      JWT_EXPIRES_IN: 1h

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Run backend tests
        run: npm test

      - name: Run frontend tests
        run: npm run test:frontend

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend
